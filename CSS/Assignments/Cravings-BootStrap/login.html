<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Login</title>

  <style>
    :root {
      --color-primary: #c2410c;
      --color-base-200: #f5ede5;
    }

    /* ONLY 2% CSS */
    body {
      background: url('./images/bgImage1-BgVBBcls.jpg') center/cover no-repeat;
      height: 100vh;
    }

    .login-box {
      background: var(--color-base-200);
      max-width: 500px;
      width: 100%;
      border-radius: 15px;
    }

    .btn-custom {
      background-color: var(--color-primary);
      color: white;
    }

    .btn-custom:hover {
      background-color: #a3360a;
    }

  </style>
</head>

<body class="d-flex justify-content-center align-items-center">

  <div class="login-box p-5 shadow">

    <!-- Heading -->
    <h1 class="text-center fw-bold mb-2" style="color: var(--color-primary);">
      Welcome Back
    </h1>
    <p class="text-center text-muted mb-4">
      Login to your Cravings account
    </p>

    <!-- Form -->
    <form>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-medium">Password</label>
        <input type="password" class="form-control" placeholder="Enter your password">
      </div>

      <!-- Options -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <input type="checkbox" class="form-check-input me-1">
          <label class="form-check-label">Remember me</label>
        </div>

        <a href="#" class="text-decoration-none" style="color: var(--color-primary);">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <button class="btn btn-custom w-100 py-2 mb-3">
        Login
      </button>

      <!-- Divider -->
      <div class="text-center text-muted mb-2">
        <hr>
        Don't have an account?
      </div>

      <!-- Create account -->
      <p class="text-center">
        <a href="#" class="text-decoration-none fw-medium" style="color: var(--color-primary);">
          Create an account
        </a>
      </p>

    </form>

  </div>

</body>
</html>
