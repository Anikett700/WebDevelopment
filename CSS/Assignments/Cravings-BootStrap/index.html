<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cravings-Static</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  </head>
  <body>
      <!-- HEADER -->
    <header>
      <nav class="d-flex justify-content-between align-items-center">
        <a href="./index.html">
          <img src="./images/transparentLogoLight-De2Z7I01.png" alt="logo">
        </a>
        <button class="bg-transparent border border-0  d-flex gap-3 align-items-center">
          <a href="#" id="loginBtn" class="text-decoration-none rounded-1">Login</a>
          <a href="#" id="registerbtn" class="text-decoration-none rounded-1">Register</a>
        </button>
      </nav>
    </header>

      <!-- MAIN -->
    <main>
 <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">

  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="3"></button>
  </div>

  <!-- Images -->
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="./images/bgImage1-BgVBBcls.jpg" class="d-block w-100" style="height: 700px; object-fit: cover;">
    </div>

    <div class="carousel-item">
      <img src="./images/bgImage2-CSvQeVNX.jpg" class="d-block w-100" style="height: 700px; object-fit: cover;">
    </div>

    <div class="carousel-item">
      <img src="./images/bgImage3-BTY6Sz_K.jpg" class="d-block w-100" style="height: 700px; object-fit: cover;">
    </div>

    <div class="carousel-item">
      <img src="./images/bgImage4-L1QELaMd.jpg" class="d-block w-100" style="height: 700px; object-fit: cover;">
    </div>

  </div>

  <!-- Previous Button -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <!-- Next Button -->
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
    </main>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
