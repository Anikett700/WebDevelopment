<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Task 3:</h1>

    <h1>Registratioin Form</h1>

    <form>
      <label for="fname"><b>First Name:</b></label>
      <input
        type="text"
        id="fname"
        name="fname"
        placeholder="Enter First name"
      />

      <br />

      <label for="lname"><b>Last Name:</b></label>
      <input
        type="text"
        id="lname"
        name="lname"
        placeholder="Enter Last name"
      />

      <br />

      <label for="email"><b>Email:</b></label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter Your Email"
      />

      <br />

      <label for="password"><b>Password:</b></label>
      <input type="password" id="password" name="password" />

      <br />

      <label for="gender"><b>Gender:</b></label
      ><br />

      <label for="male"><b>Male</b></label>
      <input type="radio" id="male" name="gender" /><br />

      <label for="female"><b>Female</b></label>
      <input type="radio" id="female" name="gender" /><br />

      <label for="other"><b>Other</b></label>
      <input type="radio" id="other" name="gender" /><br />

      <label for="Age"><b>Age:</b></label>
      <input type="number" id="Age" name="Age" /> <br />

      <label for="preference"><b>Preference:</b></label
      ><br />

      <label for="Acrylic Painting"><b>Acrylic Painting</b></label>
      <input
        type="checkbox"
        id="Acrylic Painting"
        name="Acrylic Painting"
      /><br />

      <label for="Oil Painting"><b>Oil Painting</b></label>
      <input type="checkbox" id="Oil Painting" name="Oil Painting" /><br />

      <label for="Water Color Painting"><b>Water Color Painting</b></label>
      <input
        type="checkbox"
        id="Water Color Painting"
        name="Water Color Painting"
      /><br />

      <label for="occupation"><b>Occupation:</b></label>
      <select id="occupation" name="occupation">
        <option value="student">Student</option>
        <option value="artist">Artist</option>
        <option value="designer">Designer</option>
        <option value="other">Other</option></select
      ><br />

      Bio
      <textarea
        name="bio"
        id="bio"
        placeholder="Share few lines about yourself..."
      ></textarea>

      <br />

      <button type="Reset"><b>RESET</b></button>
      <button type="Submit"><b>SUBMIT</b></button>
    </form>
  </body>
</html>
