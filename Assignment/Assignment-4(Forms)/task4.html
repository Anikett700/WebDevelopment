<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Task 4:</h1>

    <h1>Application Form</h1>
    <br />

    <form>
      <label for="First Name"><b>First Name:</b></label>
      <input type="text" id="First Name" name="First Name" />

      <label for="Last Name"><b>Last Name:</b></label>
      <input type="text" id="Last Name" name="Last Name" /><br /><br />

      <label for="date"><b>Date of birth:</b></label>
      <input type="text" id="date" name="date" placeholder="DD/MM/YYYY" />

      <label for="age"><b>Age:</b></label>
      <input type="number" id="age" name="age" /><br /><br />

      <label for="gender"><b>Gender:</b></label>
      <select id="gender" name="gender">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <label for="email"><b>Email Address:</b></label>
      <input
        type="text"
        id="email"
        name="email"
        placeholder="Enter email address"
      /><br /><br />

      <b
        >Position Available:
        <input
          type="radio"
          id="position1"
          name="position"
          value="Junior Developer"
        />
        <label for="position">Junior Developer</label>
        <input
          type="radio"
          id="position2"
          name="position"
          value="Mid-level Developer"
        />
        <label for="position">Mid-level Developer</label>
        <input
          type="radio"
          id="position3"
          name="position"
          value="Senior Developer"
        />
        <label for="position">Senior Developer</label>
      </b><br><br>

      <b>
        Programming language:
        <input type="checkbox" id="checkbox" name="checkbox" value="Java" />
        <label for="checkbox">Java</label>
        <input type="checkbox" id="checkbox" name="checkbox" value="JavaScript" />
        <label for="checkbox">JavaScript</label>
        <input type="checkbox" id="checkbox" name="checkbox" value="Python" />
        <label for="checkbox">Python</label>
      </b><br><br>

      <label for="password"><b>Password:</b></label>
      <input type="number" id="password" name="password">

      <label for="password"><b>Confirm Password:</b></label>
      <input type="number" id="password" name="password"><br><br>

      <button type="submit"><b>Submit</b></button>
      <button type="reset"><b>Reset</b></button>



    </form>
  </body>
</html>
